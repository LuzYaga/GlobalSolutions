<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroSat AI - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <div class="glass-card login-card animate-fade">
        <div class="login-logo">
            <div class="logo-text">AgroSat AI</div>
        </div>
        <div class="logo-slogan" style="font-size: 0.9rem; margin-bottom: 2rem;">
            Seu satélite virtual para proteger pequenas propriedades rurais
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail de Acesso</label>
                <input type="email" id="email" class="form-input" placeholder="exemplo@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="senha">Senha de Acesso</label>
                <input type="password" id="senha" class="form-input" placeholder="Insira sua senha" required>
            </div>

            <button type="submit" class="btn-primary" id="btnEntrar">Entrar na Plataforma</button>
        </form>

        <div class="login-error" id="loginError"></div>

    </div>

    <!-- Dados simulados e lógica -->
    <script>
        // Define bypass para login para não redirecionar
        localStorage.setItem('agrosat_login_bypass', 'true');
    </script>
    <script src="js/dados.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
